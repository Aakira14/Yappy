<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1">
    <meta content="Create a Yappy account" name="description">

    <title>Create Account • Yappy</title>
    <link rel="icon" type="image/png" href="resources/gwp_logo_uni.png"/>

    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/native.css">
    <link rel="stylesheet" href="styles/customClasses.css">
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body onload="initSignupPage()">
    <main class="authShell">
        <div class="authCard">
            <div class="brandRow">
                <div class="brandMark" aria-hidden="true"></div>
                <div class="brandName">Yappy</div>
            </div>

            <h1 class="authTitle">Create account</h1>
            <p class="authHint">Password must be at least 6 characters.</p>

            <div id="errorText" class="errorText" role="alert"></div>

            <form class="authForm" id="signupForm">
                <label class="fieldLabel">
                    <span>Username</span>
                    <input id="username" type="text" autocomplete="username" minlength="2" maxlength="24" required>
                </label>

                <label class="fieldLabel">
                    <span>Email</span>
                    <input id="email" type="email" autocomplete="email" required>
                </label>

                <label class="fieldLabel">
                    <span>Password</span>
                    <div class="passwordWrap">
                        <input id="password" type="password" autocomplete="new-password" minlength="6" required>
                        <button class="togglePassword" id="togglePassword" type="button">Show</button>
                    </div>
                </label>

                <div class="authActions">
                    <button class="buttonSelected" type="submit">Create account</button>
                </div>
            </form>

            <div class="authLinks">
                <a href="login.html">Back to login</a>
                <a href="index.html">Home</a>
            </div>
        </div>
    </main>

    <script src="scripts/auth.js"></script>
    <script src="scripts/signup.js"></script>
</body>
</html>
